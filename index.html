<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>New Order - Planilhada</title>
    <style>
        :root {
            --bg: #0c0c0e;
            --card: #18181b;
            --border: #27272a;
            --gold: #d4af37;
            --green: #10b981;
            --red: #ef4444;
            --text: #f4f4f5;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .search-header {
            position: sticky; top: 0; width: 100%;
            background: rgba(12, 12, 14, 0.95); backdrop-filter: blur(12px);
            padding: 15px 0; z-index: 1000; border-bottom: 1px solid var(--border);
            display: flex; justify-content: center;
        }
        .search-container { position: relative; width: 90%; max-width: 500px; }
        #searchInput {
            width: 100%; padding: 12px 40px 12px 20px; border-radius: 8px;
            border: 1px solid var(--border); background: #1a1a1e; color: #fff; outline: none; box-sizing: border-box;
        }
        #clearSearch {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: #27272a; color: #fff; border: none; border-radius: 50%;
            width: 20px; height: 20px; cursor: pointer; display: none; font-size: 10px;
        }

        header { text-align: center; margin: 50px 0 30px 0; }
        .logo { max-width: 220px; height: auto; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(212,175,55,0.2)); }
        h1 { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; color: var(--gold); margin: 0; letter-spacing: 4px; }
        #sync-text { font-size: 0.7rem; color: #52525b; text-transform: uppercase; margin-top: 8px; font-weight: bold; letter-spacing: 1px; }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 16px; width: 90%; max-width: 1300px; margin-bottom: 80px;
        }

        .hunt-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: 0.2s; position: relative; }
        .card-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .header-info h2 { margin: 0; font-size: 1rem; font-weight: 700; text-transform: uppercase; color: #fff; }

        .card-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; background: #131316; }
        .hunt-card.active .card-content { max-height: 1500px; border-top: 1px solid var(--border); }

        .slot { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid #1f1f23; }
        
        .current-slot { background: rgba(212, 175, 55, 0.1) !important; border-left: 5px solid var(--gold) !important; }
        .current-slot .time { color: var(--gold) !important; font-weight: 900 !important; }

        .time { font-family: 'Roboto Mono', monospace; font-size: 0.85rem; color: #fff; font-weight: 700; }
        .player-group { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .player-row { display: flex; align-items: center; gap: 6px; }
        
        /* TAG NOVO PLAYER */
        .new-player-badge { font-size: 0.55rem; color: var(--gold); font-weight: 900; background: rgba(212, 175, 55, 0.1); padding: 1px 4px; border-radius: 3px; border: 1px solid var(--gold); margin-left: 4px; }

        .spot-tag { font-size: 0.6rem; color: #71717a; background: #27272a; padding: 2px 6px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
        .p-tag { background: #27272a; color: #fff; padding: 4px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; border-left: 3px solid var(--gold); text-transform: uppercase; }
        
        .free-label { color: var(--green); font-size: 0.75rem; font-weight: 800; }
        .whatsapp-footer { padding: 12px; background: #1a1a1e; border-top: 1px solid var(--border); }
        .copy-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); width: 100%; padding: 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .copy-btn:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

<div class="search-header">
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Pesquisar Local ou Player...">
        <button id="clearSearch">X</button>
    </div>
</div>

<header>
    <img src="logoneworder.png" alt="NEW ORDER - HUNTS" class="logo">
    <h1>NEW ORDER HUNTS</h1>
    <div id="sync-text">Sincronizando...</div>
</header>

<div id="hunt-grid" class="grid"></div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyOCLLCCS7oC4kj6KYzEymrb3sXXh7lSt-qEtkcX7qas23tEGDfppFxIOowPWYqQ-1v/exec';
    const turnosFixos = ["10:00-13:00", "13:00-16:00", "16:00-19:00", "19:00-22:00", "22:00-01:00", "01:00-04:00", "04:00-07:00", "07:00-10:00"];

    function getPlayerColor(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
        return `hsl(${Math.abs(hash) % 360}, 50%, 50%)`;
    }

    function isNow(timeRange) {
        try {
            const now = new Date();
            const currentMin = now.getHours() * 60 + now.getMinutes();
            const parts = timeRange.replace(/h/g, ':').split('-').map(t => {
                const [h, m] = t.trim().split(':');
                return (parseInt(h) * 60) + (parseInt(m) || 0);
            });
            if (parts.length < 2) return false;
            const [start, end] = parts;
            return start < end ? (currentMin >= start && currentMin < end) : (currentMin >= start || currentMin < end);
        } catch(e) { return false; }
    }

    async function fetchData() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            
            const history = JSON.parse(localStorage.getItem('huntsHistory') || '{}');
            let globalChanges = [];

            data.forEach(hunt => {
                const huntID = hunt.nome;
                const newSlots = hunt.slots.map(s => s.player.trim());
                const oldSlots = history[huntID] || [];

                // Verifica mudanças em cada slot desta hunt
                newSlots.forEach((val, i) => {
                    if (oldSlots[i] !== undefined && val !== oldSlots[i] && val !== "") {
                        globalChanges.push({ hunt: huntID, index: i, newPlayer: val });
                    }
                });

                history[huntID] = newSlots;
            });

            localStorage.setItem('huntsHistory', JSON.stringify(history));
            render(data, globalChanges);
            document.getElementById('sync-text').innerText = "Atualizado: " + new Date().toLocaleTimeString();
        } catch (e) { document.getElementById('sync-text').innerText = "Erro de Sincronização"; }
    }

    function render(data, globalChanges) {
        const grid = document.getElementById('hunt-grid');
        grid.innerHTML = '';

        data.forEach(hunt => {
            if (!hunt.nome) return;

            let slotsHtml = '';
            let exportData = [];
            let vagoCount = 0;
            const huntChanges = globalChanges.filter(c => c.hunt === hunt.nome);
            const isManualHunt = hunt.slots.some(s => s.player.includes('['));

            const processSlot = (time, rawInput, slotIndex) => {
                const isBusy = rawInput.length > 0 && rawInput.toLowerCase() !== "livre";
                if (!isBusy) vagoCount++;
                exportData.push({ time, player: isBusy ? rawInput : null });

                const activeClass = isNow(time) ? 'current-slot' : '';
                const hasSlotChange = huntChanges.some(c => c.index === slotIndex);

                let html = `<div class="slot ${activeClass}"><span class="time">${time}</span><div class="player-group">`;
                
                if (isBusy) {
                    rawInput.split(/[/,]+/).filter(n => n.trim() !== "").forEach(p => {
                        let name = p.trim(), spot = "";
                        if (name.includes(':')) [spot, name] = name.split(':');
                        else if (name.includes('-')) [spot, name] = name.split('-');
                        
                        html += `<div class="player-row">
                            ${spot ? `<span class="spot-tag">${spot.trim()}</span>` : ''}
                            <span class="p-tag" style="border-left-color:${getPlayerColor(name.trim())}">${name.trim()}</span>
                            ${hasSlotChange ? '<span class="new-player-badge">NOVO</span>' : ''}
                        </div>`;
                    });
                } else { html += `<span class="free-label">DISPONÍVEL</span>`; }
                html += `</div></div>`;
                return html;
            };

            if (isManualHunt) {
                hunt.slots.forEach((slot, i) => {
                    const raw = slot.player.trim();
                    const match = raw.match(/\[(.*?)\]/);
                    if (match) slotsHtml += processSlot(match[1], raw.replace(/\[.*?\]/, "").trim(), i);
                });
            } else {
                for (let i = 0; i < 8; i++) {
                    const pName = hunt.slots[i] ? hunt.slots[i].player.trim() : "";
                    slotsHtml += processSlot(turnosFixos[i], pName, i);
                }
            }

            const card = document.createElement('div');
            card.className = 'hunt-card';
            if (huntChanges.length > 0) card.style.borderColor = "var(--gold)";

            card.innerHTML = `
                <div class="card-header" onclick="this.parentElement.classList.toggle('active')">
                    <div class="header-info">
                        <h2>${hunt.nome} ${huntChanges.length > 0 ? '<span style="color:var(--gold)">★</span>' : ''}</h2>
                        <span class="avail-tag" style="color:${vagoCount > 0 ? 'var(--green)' : 'var(--red)'}">● ${isManualHunt ? 'PERSONALIZADO' : vagoCount + ' VAGAS'}</span>
                    </div>
                </div>
                <div class="card-content">${slotsHtml}<div class="whatsapp-footer"><button class="copy-btn">Copiar para WhatsApp</button></div></div>
            `;

            card.querySelector('.copy-btn').onclick = () => {
                let text = `⚔️ *NEW ORDER - STATUS HUNT*\n📍 *Local:* ${hunt.nome.toUpperCase()}\n\n`;
                exportData.forEach(s => text += `🕒 [${s.time}] ${s.player || '🟢 DISPONÍVEL'}\n`);
                const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                card.querySelector('.copy-btn').innerText = 'COPIADO!';
                setTimeout(() => card.querySelector('.copy-btn').innerText = 'Copiar para WhatsApp', 2000);
            };
            grid.appendChild(card);
        });
    }

    const sInput = document.getElementById('searchInput');
    const cBtn = document.getElementById('clearSearch');
    sInput.addEventListener('input', (e) => {
        const termo = e.target.value.toLowerCase();
        cBtn.style.display = termo ? 'block' : 'none';
        document.querySelectorAll('.hunt-card').forEach(card => card.style.display = card.innerText.toLowerCase().includes(termo) ? 'block' : 'none');
    });
    cBtn.onclick = () => { sInput.value = ''; sInput.dispatchEvent(new Event('input')); };

    fetchData();
    setInterval(fetchData, 60000);
</script>
</body>
</html>
